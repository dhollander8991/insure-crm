name: InsureCRM CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-auth-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build auth-service
        run: |
          cd auth-service
          mvn package -DskipTests
      - name: Build Docker image
        run: |
          cd auth-service
          docker build -t insurecrm/auth-service:latest .

  build-customer-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build customer-service
        run: |
          cd customer-service
          mvn package -DskipTests
      - name: Build Docker image
        run: |
          cd customer-service
          docker build -t insurecrm/customer-service:latest .

  build-policy-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Java 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build policy-service
        run: |
          cd policy-service
          mvn package -DskipTests
      - name: Build Docker image
        run: |
          cd policy-service
          docker build -t insurecrm/policy-service:latest .