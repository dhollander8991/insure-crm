spring.application.name=ai-service
server.port=8084

# Claude API
anthropic.api.key=${ANTHROPIC_API_KEY}

# Service URLs
customer.service.url=http://localhost:8082
policy.service.url=http://localhost:8083

# Model
anthropic.model=${ANTHROPIC_MODEL:claude-sonnet-4-5}

# JWT
jwt.secret=${JWT_SECRET:insurecrm-super-secret-key-2024-must-be-long-enough}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always